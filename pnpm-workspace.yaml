packages:
  - packages/*
  - playground

catalog:
  # Framework Core
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  vue: ^3.5.25

  # Vue Ecosystem
  '@vitejs/plugin-vue': ^6.0.2
  '@vue/tsconfig': ^0.8.1
  vue-tsc: ^3.1.5

  # TypeScript Tooling
  typescript: ^5.9.3
  '@types/node': ^24.11.0
  tsx: ^4.21.0

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
